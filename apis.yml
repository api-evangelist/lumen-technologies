    properties:
      - url: https://developer.lumen.com/products
        type: Documentation
    description: >-
      The Lumen Network API provides programmatic access to Lumen's network
      and data services. The Developer Center enables access to simple, global,
      secure, and reliable network APIs that allow customers to build
      applications leveraging Lumen's telecom and fiber infrastructure.
      Authentication uses OAuth 2.0 client credentials grant type.
